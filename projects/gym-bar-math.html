  .round-chooser { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 320px; }

  .round-btns { display: flex; gap: 12px; width: 100%; }

    border: none;

  <nav class="home-nav"><a href="../index.html">&#8592; Projects</a></nav>

<!-- Flash overlay -->
<div class="flash" id="flash"></div>

<!-- START SCREEN -->
<div class="screen active" id="start-screen">
  <div class="logo">
    <h1>BAR<br>MATH</h1>
    <p>Load the bar. Beat the clock.</p>

  </div>
  <div class="round-chooser">

<script>
// ── PLATE CONFIG ──
const PLATE_DEFS = [
  { lbs: 45, color: '#2471a3', label: '45', border: '#1a5276' },
  { lbs: 35, color: '#d4ac0d', label: '35', border: '#9a7d0a' },
  { lbs: 25, color: '#27ae60', label: '25', border: '#1e8449' },
  { lbs: 10, color: '#626567', label: '10', border: '#424949' },
  { lbs: 5,  color: '#d5d8dc', label: '5',  border: '#aab7b8' },
  { lbs: 2.5,color: '#784212', label: '2.5',border: '#512e5f' },
];

const BAR_WEIGHT = 45;

// ── VALID TARGET WEIGHTS ──
// Generate all reachable weights using available plates (any quantity each side)
function generateValidWeights() {
  const plates = [45, 35, 25, 10, 5, 2.5];
  const reachable = new Set();
  // BFS/brute force up to reasonable plate count per side
  function recurse(remaining, used) {
    const total = BAR_WEIGHT + remaining * 2;
    if (total > BAR_WEIGHT) reachable.add(total);
    if (used >= 6) return; // cap depth
    for (const p of plates) {
      recurse(remaining + p, used + 1);
    }
  }
  // Actually build from scratch properly
  const sideWeights = new Set([0]);
  const queue = [0];
  const visited = new Set([0]);
  while (queue.length) {
    const w = queue.shift();
    for (const p of plates) {
      const nw = Math.round((w + p) * 10) / 10;
      if (nw <= 300 && !visited.has(nw)) {
        visited.add(nw);
        sideWeights.add(nw);
        queue.push(nw);
      }
    }
  }
  const result = [];
  for (const sw of sideWeights) {
    if (sw === 0) continue;
    const total = Math.round((BAR_WEIGHT + sw * 2) * 10) / 10;
    if (total >= 65 && total <= 315) result.push(total);
  }
  return [...new Set(result)].sort((a, b) => a - b);
}

const VALID_WEIGHTS = generateValidWeights();

// ── STATE ──
let totalRounds = 5;
let currentRound = 0;
let totalScore = 0;
let roundScores = [];
let totalTime = 0;
let totalPlatesUsed = 0;
let roundsWon = 0;

let targetWeight = 0;
let platesAdded = []; // array of lbs values per side
let timerInterval = null;
let timerStart = 0;
let elapsed = 0;
let roundFailed = false;

// ── ROUND SELECTION ──
function selectRounds(n) {
  totalRounds = n;
  document.querySelectorAll('.round-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-rounds="${n}"]`).classList.add('selected');
  document.getElementById('start-btn').classList.add('ready');
}

// ── START GAME ──
function startGame() {
  currentRound = 0;
  totalScore = 0;
  roundScores = [];
  totalTime = 0;
  totalPlatesUsed = 0;
  roundsWon = 0;
  showScreen('game-screen');
  nextRound();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── ROUND ──
function nextRound() {
  currentRound++;
  platesAdded = [];
  roundFailed = false;
  elapsed = 0;

  // Pick random target
  targetWeight = VALID_WEIGHTS[Math.floor(Math.random() * VALID_WEIGHTS.length)];

  // Update HUD
  document.getElementById('round-val').textContent = `${currentRound}/${totalRounds}`;
  document.getElementById('score-val').textContent = totalScore;
  document.getElementById('target-display').innerHTML = `${targetWeight} <span>lbs</span>`;
  document.getElementById('msg-bar').textContent = '';
  document.getElementById('msg-bar').className = 'msg-bar';

  renderPlateGrid();
  renderBar();
  updateButtons();
  startTimer();
}

// ── TIMER ──
function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  timerInterval = setInterval(() => {
    elapsed = (Date.now() - timerStart) / 1000;
    const el = document.getElementById('timer-val');

    if (elapsed >= 60) {
      elapsed = 60;
      stopTimer();
      el.textContent = '60.0';
      el.className = 'hud-val urgent';
      flash('red');
      setMsg("Time's up! Round forfeited.", 'error');
      roundFailed = true;
      roundScores.push(0);
      lockButtons();
      setTimeout(() => advanceRound(), 1800);
      return;
    }

    el.textContent = elapsed.toFixed(1);
    el.className = 'hud-val' + (elapsed > 45 ? ' urgent' : '');
  }, 100);
}

function stopTimer() {
  clearInterval(timerInterval);
  totalTime += elapsed;
}

// ── PLATE GRID ──
function renderPlateGrid() {
  const grid = document.getElementById('plate-grid');
  grid.innerHTML = '';

  PLATE_DEFS.forEach(p => {
    const count = platesAdded.filter(x => x === p.lbs).length;
    const btn = document.createElement('button');
    btn.className = 'plate-btn';
    btn.onclick = () => addPlate(p.lbs);

    // Plate icon SVG
    const plateW = p.lbs >= 25 ? 40 : p.lbs >= 10 ? 34 : 28;
    const plateH = p.lbs >= 25 ? 40 : p.lbs >= 10 ? 30 : 24;
    btn.innerHTML = `
      <svg width="${plateW}" height="${plateH}" viewBox="0 0 ${plateW} ${plateH}">
        <rect width="${plateW}" height="${plateH}" rx="4" fill="${p.color}" stroke="${p.border}" stroke-width="2"/>
        <text x="${plateW/2}" y="${plateH/2+1}" text-anchor="middle" dominant-baseline="middle"
          font-family="Bebas Neue, sans-serif" font-size="${p.lbs >= 10 ? 14 : 11}" fill="rgba(0,0,0,0.7)">${p.label}</text>
      </svg>
      <span class="plate-lbs">${p.label}</span>
      <span class="plate-count ${count > 0 ? 'active' : ''}">×${count}</span>
    `;
    grid.appendChild(btn);
  });
}

// ── ADD / UNDO / CLEAR ──
function addPlate(lbs) {
  platesAdded.push(lbs);
  renderBar();
  renderPlateGrid();
  updateButtons();
  checkRoundState();
}

function undoPlate() {
  if (platesAdded.length === 0) return;
  platesAdded.pop();
  setMsg('');
  renderBar();
  renderPlateGrid();
  updateButtons();
}

function clearPlates() {
  platesAdded = [];
  setMsg('');
  renderBar();
  renderPlateGrid();
  updateButtons();
}

function updateButtons() {
  const hasPlates = platesAdded.length > 0;
  document.getElementById('undo-btn').disabled = !hasPlates;
  document.getElementById('clear-btn').disabled = !hasPlates;
}

function lockButtons() {
  document.getElementById('undo-btn').disabled = true;
  document.getElementById('clear-btn').disabled = true;
}

// ── CHECK STATE AFTER EACH PLATE ──
function checkRoundState() {
  const sideWeight = platesAdded.reduce((a, b) => a + b, 0);
  const total = Math.round((BAR_WEIGHT + sideWeight * 2) * 10) / 10;

  if (total > targetWeight) {
    // Over — fail
    flash('red');
    setMsg('Too heavy! Bar exceeded target.', 'error');
    stopTimer();
    roundFailed = true;
    roundScores.push(0);
    lockButtons();
    setTimeout(() => advanceRound(), 1800);
    return;
  }

  if (total === targetWeight) {
    // Exact — win!
    stopTimer();
    flash('green');
    const plateCount = platesAdded.length;
    totalPlatesUsed += plateCount;
    roundsWon++;

    const minPlates = minPlatesFor(targetWeight);
    const extraPlates = Math.max(0, plateCount - minPlates);
    const roundScore = Math.max(50, Math.round(1000 - elapsed * 20 - extraPlates * 50));
    totalScore += roundScore;
    roundScores.push(roundScore);

    setMsg(`+${roundScore} pts — ${plateCount} plate${plateCount !== 1 ? 's' : ''} per side`, 'success');
    document.getElementById('score-val').textContent = totalScore;
    lockButtons();
    setTimeout(() => advanceRound(), 1500);
  }
}

function advanceRound() {
  if (currentRound >= totalRounds) {
    endGame();
  } else {
    nextRound();
  }
}

// ── MIN PLATES CALCULATION ──
function minPlatesFor(target) {
  const sideWeight = (target - BAR_WEIGHT) / 2;
  const plates = [45, 35, 25, 10, 5, 2.5];
  let rem = Math.round(sideWeight * 10) / 10;
  let count = 0;
  for (const p of plates) {
    while (Math.round(rem * 10) / 10 >= p) {
      rem = Math.round((rem - p) * 10) / 10;
      count++;
    }
  }
  return count;
}

// ── BAR RENDERING ──
function renderBar() {
  const svg = document.getElementById('bar-svg');
  svg.innerHTML = '';
  const W = 360, H = 90;
  const cx = W / 2;
  const barY = H / 2;
  const barH = 10;
  const collarW = 8;
  const sleeveLen = 110;
  const innerLen = 80;

  // Center bar (knurled area)
  rect(svg, cx - innerLen, barY - barH/2, innerLen*2, barH, '#555', '#3a3a3a', 2);
  // Knurl texture lines
  for (let i = -innerLen + 8; i < innerLen; i += 10) {
    line(svg, cx + i, barY - barH/2 + 1, cx + i + 4, barY + barH/2 - 1, '#444', 1.5);
  }

  // Left sleeve
  rect(svg, cx - innerLen - sleeveLen, barY - barH/2 + 1, sleeveLen, barH - 2, '#777', '#555', 1.5);
  // Right sleeve
  rect(svg, cx + innerLen, barY - barH/2 + 1, sleeveLen, barH - 2, '#777', '#555', 1.5);

  // End caps
  rect(svg, cx - innerLen - sleeveLen - 5, barY - barH/2 - 2, 5, barH + 4, '#999', '#666', 1);
  rect(svg, cx + innerLen + sleeveLen, barY - barH/2 - 2, 5, barH + 4, '#999', '#666', 1);

  // Collars
  rect(svg, cx - innerLen - collarW, barY - barH/2 - 4, collarW, barH + 8, '#aaa', '#888', 2);
  rect(svg, cx + innerLen, barY - barH/2 - 4, collarW, barH + 8, '#aaa', '#888', 2);

  // Draw plates — sorted largest first
  const sorted = [...platesAdded].sort((a, b) => b - a);

  let leftX = cx - innerLen - collarW; // grows left
  let rightX = cx + innerLen + collarW; // grows right

  sorted.forEach(lbs => {
    const def = PLATE_DEFS.find(p => p.lbs === lbs);
    const pw = plateWidth(lbs);
    const ph = plateHeight(lbs);
    const py = barY - ph / 2;

    // Left plate
    rectEl(svg, leftX - pw, py, pw, ph, def.color, def.border, 2, 3);
    text(svg, leftX - pw/2, barY, lbs >= 10 ? lbs.toString() : lbs.toString(), '#000', lbs >= 25 ? 9 : 7);

    // Right plate
    rectEl(svg, rightX, py, pw, ph, def.color, def.border, 2, 3);
    text(svg, rightX + pw/2, barY, lbs >= 10 ? lbs.toString() : lbs.toString(), '#000', lbs >= 25 ? 9 : 7);

    leftX -= pw;
    rightX += pw;
  });
}

function plateWidth(lbs) {
  if (lbs >= 45) return 14;
  if (lbs >= 35) return 12;
  if (lbs >= 25) return 11;
  if (lbs >= 10) return 9;
  if (lbs >= 5)  return 8;
  return 7;
}

function plateHeight(lbs) {
  if (lbs >= 45) return 70;
  if (lbs >= 35) return 62;
  if (lbs >= 25) return 54;
  if (lbs >= 10) return 44;
  if (lbs >= 5)  return 34;
  return 26;
}

// SVG helpers
function rect(parent, x, y, w, h, fill, stroke, sw) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  el.setAttribute('x', x); el.setAttribute('y', y);
  el.setAttribute('width', w); el.setAttribute('height', h);
  el.setAttribute('fill', fill);
  if (stroke) { el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw); }
  parent.appendChild(el);
  return el;
}
function rectEl(parent, x, y, w, h, fill, stroke, sw, rx) {
  const el = rect(parent, x, y, w, h, fill, stroke, sw);
  if (rx) el.setAttribute('rx', rx);
  return el;
}
function line(parent, x1, y1, x2, y2, stroke, sw) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  el.setAttribute('x1', x1); el.setAttribute('y1', y1);
  el.setAttribute('x2', x2); el.setAttribute('y2', y2);
  el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw);
  parent.appendChild(el);
}
function text(parent, x, y, txt, fill, size) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  el.setAttribute('x', x); el.setAttribute('y', y);
  el.setAttribute('text-anchor', 'middle');
  el.setAttribute('dominant-baseline', 'middle');
  el.setAttribute('fill', fill);
  el.setAttribute('font-family', 'Bebas Neue, sans-serif');
  el.setAttribute('font-size', size);
  el.textContent = txt;
  parent.appendChild(el);
}

// ── FLASH ──
function flash(color) {
  const el = document.getElementById('flash');
  el.className = `flash ${color} show`;
  setTimeout(() => el.classList.remove('show'), 250);
}

// ── MSG ──
function setMsg(msg, type='') {
  const el = document.getElementById('msg-bar');
  el.textContent = msg;
  el.className = 'msg-bar' + (type ? ` ${type}` : '');
}

// ── HIGH SCORES ──
const HS_KEY = 'barmath_hs';

function loadScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || { 5: [], 10: [] }; }
  catch { return { 5: [], 10: [] }; }
}

function saveScore(rounds, score, won, time) {
  const data = loadScores();
  if (!data[rounds]) data[rounds] = [];
  data[rounds].push({ score, won, time: Math.round(time) });
  data[rounds].sort((a, b) => b.score - a.score);
  data[rounds] = data[rounds].slice(0, 5);
  localStorage.setItem(HS_KEY, JSON.stringify(data));
  return data[rounds].findIndex(e => e.score === score && e.won === won && e.time === Math.round(time));
}

function renderHsList(rounds, elId) {
  const data = loadScores();
  const list = data[rounds] || [];
  const el = document.getElementById(elId);
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = '<div class="hs-empty">No scores yet — be the first!</div>';
    return;
  }
  const rankClass = ['gold', 'silver', 'bronze'];
  el.innerHTML = list.map((e, i) => `
    <div class="hs-row">
      <span class="hs-rank ${rankClass[i] || ''}">${i + 1}</span>
      <span class="hs-score">${e.score}</span>
      <span class="hs-meta">${e.won}/${rounds} won<br>${e.time}s</span>
    </div>
  `).join('');
}

function showRecords() {
  renderHsList(5, 'hs-list-5');
  renderHsList(10, 'hs-list-10');
  showScreen('records-screen');
}

// ── END GAME ──
function endGame() {
  const rank = saveScore(totalRounds, totalScore, roundsWon, totalTime);
  showScreen('end-screen');
  document.getElementById('final-score').textContent = totalScore;
  document.getElementById('stat-rounds').textContent = `${roundsWon}/${totalRounds}`;
  document.getElementById('stat-time').textContent = `${totalTime.toFixed(0)}s`;
  const avgPlates = roundsWon > 0 ? (totalPlatesUsed / roundsWon).toFixed(1) : '—';
  document.getElementById('stat-plates').textContent = avgPlates;
  const best = roundScores.length > 0 ? Math.max(...roundScores) : 0;
  document.getElementById('stat-best').textContent = best;
  const newBestEl = document.getElementById('new-best');
  newBestEl.textContent = rank === 0 ? '🏆 New High Score!' : rank > 0 && rank < 5 ? `#${rank + 1} All Time` : '';
}

function abandonGame() {
  clearInterval(timerInterval);
  goHome();
}

function goHome() {
  showScreen('start-screen');
  document.querySelectorAll('.round-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('start-btn').classList.remove('ready');
}

// ── INIT ──
renderBar();
</script>
