<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase the Ace · Ticket Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #101828;
    --border: #1e2d45;
    --gold: #c9a84c;
    --gold-light: #f0cc6e;
    --red: #e03c3c;
    --green: #2ecc71;
    --text: #d4dbe8;
    --muted: #5a6a80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 60%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 80%, rgba(201,168,76,0.1) 0%, transparent 100%),
      radial-gradient(2px 2px at 10% 70%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(600px at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 40px 20px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .crown {
    font-size: 28px;
    display: block;
    margin-bottom: 6px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 52px);
    letter-spacing: 0.05em;
    color: var(--gold-light);
    line-height: 1;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;

    margin-top: 6px;
  }

  main {
    width: 100%;
    max-width: 520px;
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.18em;

    color: var(--gold);
    margin-bottom: 10px;

  }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  textarea:focus, input[type="text"]:focus {
    border-color: var(--gold);
  }

  textarea { min-height: 140px; line-height: 1.7; }
  #winner { min-height: 100px; }

  .ticket-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }






  }

  button {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    color: #0a0f1e;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button:active {
    transform: scale(0.98);
    background: var(--gold-light);
  }

  #result {
    display: none;
    border-radius: 12px;
    padding: 24px 20px;
    text-align: center;
    animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  #result.win {
    background: rgba(46,204,113,0.12);
    border: 1px solid var(--green);
  }

  #result.loss {
    background: rgba(224,60,60,0.08);
    border: 1px solid rgba(224,60,60,0.4);
  }

  .result-icon { font-size: 48px; display: block; margin-bottom: 10px; }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 8px;
  }

  #result.win  .result-title { color: var(--green); }
  #result.loss .result-title { color: var(--red); }

  .result-detail {
    font-size: 12px;
    color: var(--muted);

  }

  .winning-code {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 15px;

    letter-spacing: 0.1em;
  }

  #result.win  .winning-code { background: rgba(46,204,113,0.15); color: var(--green); }
  #result.loss .winning-code { background: rgba(224,60,60,0.12); color: #e07070; }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
  }

  .clear-btn:active { background: var(--border); }

  .jackpot-banner {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    padding: 0 16px;
  }

  .jackpot-banner span {
    color: var(--gold);

  }
</style>
  <style>
    .home-nav { position: fixed; top: 0; left: 0; z-index: 9999; padding: 6px 14px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px); border-bottom-right-radius: 8px; }
    .home-nav a { color: rgba(255,255,255,0.75); text-decoration: none;
      font-family: monospace; font-size: 0.8rem; letter-spacing: 0.06em; }
    .home-nav a:hover { color: #fff; }
    .studios-credit { position: fixed; bottom: 0; right: 0; z-index: 9999; padding: 5px 12px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px); border-top-left-radius: 8px;
      font-family: monospace; font-size: 0.7rem; color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em; pointer-events: none; }
  </style>
</head>
<body>
  <nav class="home-nav"><a href="../index.html">&#8592; Projects</a></nav>
  <div class="studios-credit">2357 Studios</div>

<header>
  <span class="crown">♠</span>
  <h1>Chase the Ace</h1>
  <p class="subtitle">LottoAlaska · Ticket Checker</p>
</header>

<main>

  <div class="card">
    <label>Your Tickets — paste from email</label>
    <textarea id="tickets" placeholder="TY-1071679&#10;TY-1300407&#10;TY-1350321&#10;..."></textarea>
    <div class="ticket-count" id="ticketCount">0 tickets loaded</div>
  </div>

  <div class="card">
    <label>Winning Ticket — from your text</label>
    <textarea id="winner" placeholder="Paste the full text message here..."></textarea>
  </div>

  <button onclick="check()">Check My Tickets</button>

  <div id="result">
    <span class="result-icon" id="resultIcon"></span>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="winning-code" id="resultCode"></div>
  </div>

  <button class="clear-btn" onclick="clearAll()">Clear Everything</button>

  <p class="jackpot-banner">Jackpot over <span>$3.8M</span> · Good luck 🍀</p>

</main>

<script>
  const ticketsEl = document.getElementById('tickets');
  const winnerEl  = document.getElementById('winner');
  const countEl   = document.getElementById('ticketCount');
  const resultEl  = document.getElementById('result');

  function parseTickets(raw) {
    return raw.split(/[\n,\s]+/)
      .map(t => t.trim().toUpperCase())
      .filter(t => /^TY-\d+$/.test(t));
  }

  ticketsEl.addEventListener('input', () => {
    const tickets = parseTickets(ticketsEl.value);
    countEl.textContent = tickets.length === 1 ? '1 ticket loaded' : `${tickets.length} tickets loaded`;
  });



  function check() {
    const tickets = parseTickets(ticketsEl.value);
    const rawWinner = winnerEl.value.toUpperCase();
    const winnerMatch = rawWinner.match(/TY-\d+/);
    const winner = winnerMatch ? winnerMatch[0] : rawWinner.trim();

    resultEl.style.display = 'none';

    if (tickets.length === 0) {
      alert('Paste your tickets from the email first.');
      return;
    }
    if (!winner || !/^TY-\d+$/.test(winner)) {
      alert('Enter a valid winning ticket number (e.g. TY-1682828).');
      return;
    }

    const won = tickets.includes(winner);

    resultEl.className = won ? 'win' : 'loss';
    document.getElementById('resultIcon').textContent  = won ? '🎉' : '😔';
    document.getElementById('resultTitle').textContent = won ? 'WINNER!' : 'No Match';
    document.getElementById('resultDetail').textContent = won
      ? `${winner} is in your ${tickets.length} tickets`
      : `${winner} was not found among your ${tickets.length} tickets`;
    document.getElementById('resultCode').textContent = winner;
    resultEl.style.display = 'block';
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearAll() {
    ticketsEl.value = '';
    winnerEl.value  = '';
    countEl.textContent = '0 tickets loaded';
    resultEl.style.display = 'none';
  }

</script>
</body>
</html>
